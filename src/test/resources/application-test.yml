spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: TestSecretKeyMustBeAtLeast32BytesLongForHS256!!
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

logging:
  level:
    com.grown.smartoffice: INFO
    org.hibernate.SQL: WARN
    org.springframework: WARN
