spring:
  application:
    name: smartoffice-server

  profiles:
    active: local

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080