spring:
  application:
    name: smartoffice-server

  profiles:
    active: local

  datasource:
    url: jdbc:h2:file:./data/smartoffice;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    redis:
      port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

mqtt:
  enabled: false
  broker-url: tcp://localhost:1883
  client-id: smartoffice-server
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}
  topic:
    access: smartoffice/+/access

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

jwt:
  # 운영 환경: JWT_SECRET 환경변수로 주입 (절대 하드코딩 금지)
  # 로컬 개발: application-local.yml 에서 오버라이드
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000    # 30분
  refresh-token-expiration: 604800000  # 7일