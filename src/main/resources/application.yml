spring:
  application:
    name: smartoffice-server

  profiles:
    active: local

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

jwt:
  # 운영 환경: JWT_SECRET 환경변수로 주입 (절대 하드코딩 금지)
  # 로컬 개발: application-local.yml 에서 오버라이드
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000    # 30분
  refresh-token-expiration: 604800000  # 7일