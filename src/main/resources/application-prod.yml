spring:
  application:
    name: smartoffice-server

  datasource:
    url: jdbc:mysql://smartoffice-mysql:3306/smartoffice?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: smartoffice-redis
      port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  refresh-cookie:
    # 운영 환경은 HTTPS — Secure 쿠키 강제
    secure: true
    same-site: Lax

mqtt:
  enabled: true
  broker-url: ssl://${MQTT_BROKER_HOST:localhost}:8883
  client-id: smartoffice-server-prod