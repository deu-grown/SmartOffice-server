# docker-compose.yml
services:
  mysql:
    image: mysql:8.0
    container_name: smartoffice-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: smartoffice
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: smartoffice-redis
    ports:
      - "127.0.0.1:6379:6379"   # 로컬호스트에서만 접근 가능 (외부 노출 방지)
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data: